<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            color: white;
        }

        .form-control {
            background: transparent;
            color: white;
            border: 1px solid white;
        }

        .strength {
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="glass-card text-center">
    <h3 class="mb-4">📝 Register</h3>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>

        <input type="email" name="email" class="form-control mb-2" placeholder="Email">

        <input type="password" id="pass" name="password" class="form-control mb-2" placeholder="Password" onkeyup="checkStrength()" required>

        <div id="strength" class="strength text-warning mb-2"></div>

        <input type="password" name="confirm_password" class="form-control mb-3" placeholder="Confirm Password" required>

        <button class="btn btn-light w-100">Register</button>
    </form>

    <p class="mt-3">
        Already have account? <a href="/login/" class="text-dark">Login</a>
    </p>
</div>

<script>
function checkStrength(){
    let pass = document.getElementById("pass").value;
    let msg = document.getElementById("strength");

    if(pass.length < 5){
        msg.innerHTML = "Weak password";
        msg.style.color = "red";
    }
    else if(pass.length < 8){
        msg.innerHTML = "Medium strength";
        msg.style.color = "orange";
    }
    else{
        msg.innerHTML = "Strong password";
        msg.style.color = "lightgreen";
    }
}
</script>

</body>
</html>

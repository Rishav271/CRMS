{% extends 'events/base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card p-4 shadow-lg" style="max-width: 400px; width:100%; border-radius:20px;">
        
        <h3 class="text-center mb-3">💳 Payment</h3>

        <h5 class="text-center text-primary">{{ event.title }}</h5>
        <p class="text-center">Amount: ₹{{ event.price }}</p>

        <hr>

        <!-- CARD FORM -->
        <form action="{% url 'payment_success' event.id %}" method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Card Number</label>
                <input type="text" class="form-control" placeholder="1234 5678 9012 3456" required>
            </div>

            <div class="mb-3">
                <label>Card Holder Name</label>
                <input type="text" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="row">
                <div class="col-6">
                    <label>Expiry</label>
                    <input type="text" class="form-control" placeholder="MM/YY" required>
                </div>
                <div class="col-6">
                    <label>CVV</label>
                    <input type="password" class="form-control" placeholder="123" required>
                </div>
            </div>

            <button class="btn btn-success w-100 mt-4">
                Pay ₹{{ event.price }}
            </button>
        </form>

    </div>

</div>

{% endblock %}

{% extends 'events/base.html' %}

{% block content %}
<h2 class="text-white mb-4">🎉 Available Events</h2>

<div class="row">
    {% for event in events %}
    <div class="col-md-4">
        <div class="card p-3 mb-4">
            <h4>{{ event.title }}</h4>
            <p>{{ event.description }}</p>
            <p><strong>Date:</strong> {{ event.date }}</p>
            <p><strong>Location:</strong> {{ event.location }}</p>

            <a href="{% url 'register_event' event.id %}" class="btn btn-success btn-sm">
    Join Event
</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

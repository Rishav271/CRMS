<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            color: white;
        }

        .form-control {
            background: transparent;
            color: white;
            border: 1px solid white;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .toggle-eye {
            cursor: pointer;
            position: absolute;
            right: 10px;
            top: 10px;
        }
    </style>
</head>

<body>

<div class="glass-card text-center">
    <h3 class="mb-4">🔐 Login</h3>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

        <div style="position:relative;">
            <input type="password" name="password" id="password" class="form-control mb-3" placeholder="Password" required>
            <span class="toggle-eye" onclick="togglePassword()">👁</span>
        </div>

        <button class="btn btn-light w-100">Login</button>
    </form>

    <p class="mt-3">
        Don’t have account? <a href="/register/" class="text-warning">Register</a>
    </p>
</div>

<script>
function togglePassword(){
    let p = document.getElementById("password");
    p.type = (p.type === "password") ? "text" : "password";
}
</script>

</body>
</html>

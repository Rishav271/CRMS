{% extends 'events/base.html' %}

{% block content %}

<style>
.ticket-card {
    max-width: 600px;
    margin: auto;
    border-radius: 20px;
    overflow: hidden;
    background: linear-gradient(135deg, #1e1e2f, #2a2a4f);
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.ticket-header {
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 20px;
}

.ticket-body {
    padding: 20px;
}

.ticket-footer {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    text-align: center;
}

.ticket-id {
    font-size: 12px;
    opacity: 0.7;
}

/* Divider (like movie ticket cut) */
.ticket-divider {
    border-top: 2px dashed rgba(255,255,255,0.3);
    margin: 15px 0;
}

/* QR Styling */
.qr-box {
    background: white;
    padding: 10px;
    border-radius: 10px;
    display: inline-block;
}

/* Print */
@media print {
    body * {
        visibility: hidden;
    }
    .ticket-card, .ticket-card * {
        visibility: visible;
    }
    .ticket-card {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 90%;
    }
}
</style>

<div class="ticket-card animate__animated animate__zoomIn">

    <!-- Header -->
    <div class="ticket-header">
        🎟 EVENT PASS
    </div>

    <!-- Body -->
    <div class="ticket-body text-center">

        <h3 class="mb-3">{{ registration.event.title }}</h3>

        <p>📅 <strong>{{ registration.event.date }}</strong></p>
        <p>📍 {{ registration.event.location }}</p>

        <div class="ticket-divider"></div>

        <p>👤 {{ registration.user.username }}</p>

        <div class="ticket-divider"></div>

        <!-- QR Code -->
        <div class="qr-box">
            <img src="{% url 'qr' registration.event.id %}" width="150">
        </div>

        <div class="mt-3 ticket-id">
            Ticket ID: {{ registration.ticket_id }}
        </div>

    </div>

    <!-- Footer -->
    <div class="ticket-footer">

        <button onclick="window.print()" class="btn btn-success btn-sm">
            🖨 Print Ticket
        </button>

        <a href="/dashboard/" class="btn btn-light btn-sm">
            ⬅ Back
        </a>

    </div>

</div>

{% endblock %}
